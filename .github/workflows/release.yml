name: Auto Release

on:
  push:
    branches: [main]
    paths:
      - 'metadata.yaml'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract version from metadata.yaml
        id: get_version
        run: |
          # 提取版本号（去除 # 后面的注释）
          VERSION=$(grep -E '^version:' metadata.yaml | sed 's/version: *//' | sed 's/ *#.*//' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"
      
      - name: Check if release exists
        id: check_release
        run: |
          if gh release view ${{ steps.get_version.outputs.version }} &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.get_version.outputs.version }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.get_version.outputs.version }} does not exist"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract changelog for version
        if: steps.check_release.outputs.exists == 'false'
        id: get_changelog
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          echo "Looking for version: $VERSION"
          
          # 使用 sed 提取对应版本的 changelog
          CHANGELOG=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d')
          
          # 移除空行并输出
          CHANGELOG=$(echo "$CHANGELOG" | sed '/^[[:space:]]*$/d')
          
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No detailed changelog provided for this version."
          fi
          
          echo "Extracted changelog:"
          echo "$CHANGELOG"
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: ${{ steps.get_version.outputs.version }}
          body: ${{ steps.get_changelog.outputs.changelog }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
