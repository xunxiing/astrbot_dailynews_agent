name: Auto Release

on:
  push:
    branches: [main]
    paths:
      - 'metadata.yaml'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract version from metadata.yaml
        id: get_version
        run: |
          VERSION=$(grep -E '^version:' metadata.yaml | sed 's/version: *//' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"
      
      - name: Check if release exists
        id: check_release
        run: |
          if gh release view ${{ steps.get_version.outputs.version }} &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.get_version.outputs.version }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.get_version.outputs.version }} does not exist"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract changelog for version
        if: steps.check_release.outputs.exists == 'false'
        id: get_changelog
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          # 正则转义版本号（处理特殊字符）
          ESCAPED_VERSION=$(echo "$VERSION" | sed 's/[\[\]]/\\&/g')
          # 使用 awk 提取对应版本的 changelog 内容
          CHANGELOG=$(awk -v ver="[$ESCAPED_VERSION]" '
            /^## \[Unreleased\]/ {next}
            $0 ~ "^## " ver {flag=1; next}
            flag && /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md)
          
          # 移除空行并输出
          CHANGELOG=$(echo "$CHANGELOG" | sed '/^[[:space:]]*$/d')
          
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No detailed changelog provided for this version."
          fi
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: ${{ steps.get_version.outputs.version }}
          body: ${{ steps.get_changelog.outputs.changelog }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
