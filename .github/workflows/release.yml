name: Auto Release

on:
  push:
    branches: [main]
    paths:
      - 'metadata.yaml'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract version from metadata.yaml
        id: get_version
        run: |
          # жҸҗеҸ–зүҲжң¬еҸ·пјҲеҺ»йҷӨ # еҗҺйқўзҡ„жіЁйҮҠпјү
          VERSION=$(grep -E '^version:' metadata.yaml | sed 's/version: *//' | sed 's/ *#.*//' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"
      
      - name: Check if release exists
        id: check_release
        run: |
          if gh release view ${{ steps.get_version.outputs.version }} &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.get_version.outputs.version }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.get_version.outputs.version }} does not exist"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract changelog for version
        if: steps.check_release.outputs.exists == 'false'
        id: get_changelog
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          echo "Looking for version: $VERSION"
          
          # дҪҝз”Ё Python жҸҗеҸ– changelog
          CHANGELOG=$(python3 -c "
          import re
          import sys
          
          version = '$VERSION'
          
          try:
              with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
                  content = f.read()
          except FileNotFoundError:
              print('дҝ®еӨҚдәҶдёҖдәӣе·ІзҹҘй—®йўҳ')
              sys.exit(0)
          
          # еҢ№й…ҚжҢҮе®ҡзүҲжң¬зҡ„еҶ…е®№
          pattern = rf'^## \\[{re.escape(version)}\\].*?\\n(.*?)$(?=\\n## \\[|\\Z)'
          match = re.search(pattern, content, re.MULTILINE | re.DOTALL)
          
          if match:
              changelog = match.group(1).strip()
              if changelog:
                  print(changelog)
              else:
                  print('дҝ®еӨҚдәҶдёҖдәӣе·ІзҹҘй—®йўҳ')
          else:
              print('дҝ®еӨҚдәҶдёҖдәӣе·ІзҹҘй—®йўҳ')
          ")
          
          # еҰӮжһң changelog дёәз©әпјҢдҪҝз”Ёй»ҳи®ӨжҸҗзӨә
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="дҝ®еӨҚдәҶдёҖдәӣе·ІзҹҘй—®йўҳ"
          fi
          
          echo "Extracted changelog:"
          echo "$CHANGELOG"
          
          # еҶҷе…Ҙиҫ“еҮә
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT
      
      - name: Create Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: ${{ steps.get_version.outputs.version }}
          body: ${{ steps.get_changelog.outputs.changelog }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
